<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Отель Горизонт — отзывы</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Helvetica Neue', system-ui, sans-serif;
            background: linear-gradient(145deg, #dce6ed 0%, #eef4f8 100%);
            color: #162b38;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 760px;
            width: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(6px);
            border-radius: 40px;
            box-shadow: 0 40px 80px -20px rgba(10, 40, 60, 0.20);
            padding: 52px 48px 44px;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .header {
            border-bottom: 2px solid #dce6ed;
            padding-bottom: 24px;
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 12px;
        }

        .hotel-name {
            font-size: 38px;
            font-weight: 200;
            letter-spacing: 4px;
            color: #0a202e;
        }

        .hotel-name span {
            font-weight: 600;
            color: #1e6d8f;
            letter-spacing: 2px;
        }

        .hotel-sub {
            font-size: 13px;
            font-weight: 500;
            color: #4c738a;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            background: rgba(30, 109, 143, 0.08);
            padding: 6px 20px;
            border-radius: 60px;
            border: 1px solid rgba(30, 109, 143, 0.12);
        }

        .invite {
            font-size: 19px;
            line-height: 1.7;
            color: #1a3b4e;
            margin-bottom: 36px;
            padding: 20px 28px;
            background: rgba(220, 230, 237, 0.4);
            border-radius: 24px;
            border-left: 6px solid #1e6d8f;
            font-weight: 400;
        }

        .invite strong {
            font-weight: 600;
            color: #0a202e;
        }

        .form-group {
            margin-bottom: 26px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #2a556b;
            margin-bottom: 7px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 16px 22px;
            font-size: 16px;
            font-family: inherit;
            background: #f6fafd;
            border: 1.5px solid #d4e0e8;
            border-radius: 18px;
            color: #162b38;
            transition: 0.25s;
            outline: none;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #1e6d8f;
            background: #ffffff;
            box-shadow: 0 0 0 6px rgba(30, 109, 143, 0.06);
        }

        .form-group textarea {
            min-height: 130px;
            resize: vertical;
        }

        .rating-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 4px;
        }

        .rating-option {
            flex: 1 0 52px;
            text-align: center;
        }

        .rating-option input {
            display: none;
        }

        .rating-option label {
            display: block;
            padding: 12px 0;
            background: #eef5f9;
            border-radius: 16px;
            font-weight: 600;
            font-size: 20px;
            color: #2a556b;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid transparent;
        }

        .rating-option input:checked + label {
            background: #d4e7f0;
            border-color: #1e6d8f;
            color: #0a202e;
            box-shadow: 0 6px 18px rgba(30, 109, 143, 0.08);
        }

        .rating-option label:hover {
            background: #dce8f0;
        }

        .btn-submit {
            width: 100%;
            padding: 18px;
            background: #1a3e52;
            border: none;
            border-radius: 50px;
            font-size: 19px;
            font-weight: 600;
            color: white;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.25s;
            margin-top: 8px;
            box-shadow: 0 10px 28px rgba(26, 62, 82, 0.18);
        }

        .btn-submit:hover {
            background: #08212e;
            transform: scale(1.01);
            box-shadow: 0 14px 34px rgba(26, 62, 82, 0.26);
        }

        .btn-submit:active {
            transform: scale(0.96);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .reviews-section {
            margin-top: 50px;
            padding-top: 36px;
            border-top: 2px solid #dce6ed;
        }

        .reviews-title {
            font-size: 22px;
            font-weight: 300;
            color: #162b38;
            margin-bottom: 24px;
            letter-spacing: 0.5px;
        }

        .reviews-title span {
            font-weight: 600;
            color: #1e6d8f;
        }

        .review-card {
            background: #f6fafd;
            border-radius: 22px;
            padding: 24px 28px;
            margin-bottom: 18px;
            border: 1px solid #dce6ed;
            transition: 0.2s;
        }

        .review-card:hover {
            border-color: #b8cedb;
            background: #fafdfe;
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 8px 16px;
            margin-bottom: 10px;
        }

        .review-author {
            font-weight: 600;
            font-size: 18px;
            color: #0a202e;
        }

        .review-rating {
            font-size: 16px;
            font-weight: 500;
            color: #2a556b;
            background: #dce6ed;
            padding: 2px 18px;
            border-radius: 60px;
        }

        .review-text {
            font-size: 16px;
            line-height: 1.7;
            color: #1a3342;
        }

        .review-date {
            font-size: 13px;
            color: #6d8fa3;
            margin-top: 8px;
        }

        .empty-reviews {
            text-align: center;
            padding: 40px 10px;
            color: #4c738a;
            font-size: 17px;
            background: #f6fafd;
            border-radius: 24px;
            border: 1.5px dashed #d4e0e8;
        }

        .success-message {
            display: none;
            background: #d4e7f0;
            color: #0a2e40;
            padding: 18px 24px;
            border-radius: 18px;
            margin-top: 22px;
            font-weight: 500;
            text-align: center;
            border: 1px solid #b0cbd9;
        }

        .error-message {
            display: none;
            background: #f0d4d4;
            color: #5e1a1a;
            padding: 18px 24px;
            border-radius: 18px;
            margin-top: 22px;
            font-weight: 500;
            text-align: center;
            border: 1px solid #d4b0b0;
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s ease-in-out infinite;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 540px) {
            .container {
                padding: 28px 18px 24px;
            }
            .hotel-name {
                font-size: 28px;
                letter-spacing: 2px;
            }
            .invite {
                font-size: 16px;
                padding: 16px 18px;
            }
            .rating-option label {
                font-size: 17px;
                padding: 10px 0;
            }
            .btn-submit {
                font-size: 17px;
                padding: 15px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="hotel-name">
            <span>Горизонт</span> · отель
        </div>
        <div class="hotel-sub">Roblox · 4500</div>
    </div>

    <div class="invite">
        <strong>Вы покидаете отель «Горизонт»?</strong><br />
        Поделитесь впечатлениями или предложите, что добавить.
        Каждое мнение делает проект лучше.
    </div>

    <form id="reviewForm">
        <div class="form-group">
            <label for="playerName">Ваше имя в Roblox</label>
            <input type="text" id="playerName" placeholder="Например: Alex_Builder" required />
        </div>

        <div class="form-group">
            <label>Оценка</label>
            <div class="rating-group">
                <div class="rating-option">
                    <input type="radio" name="rating" id="r1" value="1" />
                    <label for="r1">1</label>
                </div>
                <div class="rating-option">
                    <input type="radio" name="rating" id="r2" value="2" />
                    <label for="r2">2</label>
                </div>
                <div class="rating-option">
                    <input type="radio" name="rating" id="r3" value="3" />
                    <label for="r3">3</label>
                </div>
                <div class="rating-option">
                    <input type="radio" name="rating" id="r4" value="4" checked />
                    <label for="r4">4</label>
                </div>
                <div class="rating-option">
                    <input type="radio" name="rating" id="r5" value="5" />
                    <label for="r5">5</label>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label for="reviewText">Отзыв или предложение</label>
            <textarea id="reviewText" placeholder="Что понравилось? Что можно улучшить? Какие комнаты или зоны добавить?" required></textarea>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">Отправить отзыв</button>
    </form>

    <div id="successMessage" class="success-message">
        Отзыв успешно сохранён! Спасибо.
    </div>

    <div id="errorMessage" class="error-message">
        Ошибка при сохранении. Попробуйте ещё раз.
    </div>

    <div class="reviews-section">
        <div class="reviews-title">
            Отзывы · <span id="reviewCount">0</span>
        </div>

        <div id="reviewsList">
            <!-- Отзывы будут загружены из Firebase -->
        </div>

        <div id="emptyMessage" class="empty-reviews" style="display: none;">
            Пока нет отзывов. Будьте первым!
        </div>
    </div>
</div>

<script>
    // ============================================================
    // 1. НАСТРОЙКА FIREBASE — ТВОИ ДАННЫЕ
    // ============================================================
    const firebaseConfig = {
        apiKey: "AIzaSyDAYN1_Bng0zCRlXgODks_1GQktnIxdXpM",
        authDomain: "gorizont-5b04d.firebaseapp.com",
        projectId: "gorizont-5b04d",
        storageBucket: "gorizont-5b04d.firebasestorage.app",
        messagingSenderId: "766100432763",
        appId: "1:766100432763:web:46ab01bb602a27f8bcffde"
    };

    // Инициализация Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ============================================================
    // 2. РАБОТА С ОТЗЫВАМИ
    // ============================================================

    const reviewsCollection = db.collection('reviews');

    // Загрузка отзывов
    function loadReviews() {
        const container = document.getElementById('reviewsList');
        const empty = document.getElementById('emptyMessage');
        const countSpan = document.getElementById('reviewCount');

        reviewsCollection
            .orderBy('createdAt', 'desc')
            .get()
            .then((snapshot) => {
                if (snapshot.empty) {
                    container.innerHTML = '';
                    empty.style.display = 'block';
                    countSpan.textContent = '0';
                    return;
                }

                empty.style.display = 'none';
                let html = '';
                let count = 0;

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    count++;
                    html += `
                        <div class="review-card">
                            <div class="review-header">
                                <span class="review-author">${escapeHtml(data.name)}</span>
                                <span class="review-rating">${data.rating}</span>
                            </div>
                            <div class="review-text">${escapeHtml(data.text)}</div>
                            <div class="review-date">${escapeHtml(data.date)}</div>
                        </div>
                    `;
                });

                container.innerHTML = html;
                countSpan.textContent = count;
            })
            .catch((error) => {
                console.error('Ошибка загрузки:', error);
                showError('Не удалось загрузить отзывы. Проверьте подключение к интернету.');
            });
    }

    // Добавление отзыва
    function addReview(name, rating, text) {
        const now = new Date();
        const dateStr = now.toLocaleDateString('ru-RU', { 
            day: 'numeric', 
            month: 'long', 
            year: 'numeric' 
        });

        return reviewsCollection.add({
            name: name.trim(),
            rating: parseInt(rating, 10),
            text: text.trim(),
            date: dateStr,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
    }

    // ============================================================
    // 3. ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
    // ============================================================

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function showSuccess() {
        const el = document.getElementById('successMessage');
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 5000);
    }

    function showError(msg) {
        const el = document.getElementById('errorMessage');
        el.textContent = msg || 'Ошибка при сохранении. Попробуйте ещё раз.';
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 5000);
    }

    function setLoading(isLoading) {
        const btn = document.getElementById('submitBtn');
        if (isLoading) {
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Отправка...';
        } else {
            btn.disabled = false;
            btn.innerHTML = 'Отправить отзыв';
        }
    }

    // ============================================================
    // 4. ОБРАБОТКА ФОРМЫ
    // ============================================================

    const form = document.getElementById('reviewForm');

    form.addEventListener('submit', function(e) {
        e.preventDefault();

        const nameInput = document.getElementById('playerName');
        const ratingInput = document.querySelector('input[name="rating"]:checked');
        const textInput = document.getElementById('reviewText');

        const name = nameInput.value.trim();
        const rating = ratingInput ? ratingInput.value : '4';
        const text = textInput.value.trim();

        if (!name || !text) {
            showError('Пожалуйста, заполните имя и текст отзыва.');
            return;
        }

        setLoading(true);

        addReview(name, rating, text)
            .then(() => {
                // Очищаем форму
                nameInput.value = '';
                textInput.value = '';
                const defaultRating = document.getElementById('r4');
                if (defaultRating) defaultRating.checked = true;

                showSuccess();
                loadReviews(); // Перезагружаем список
            })
            .catch((error) => {
                console.error('Ошибка:', error);
                showError('Не удалось сохранить отзыв. Проверьте подключение к интернету.');
            })
            .finally(() => {
                setLoading(false);
            });
    });

    // ============================================================
    // 5. ЗАГРУЗКА ПРИ СТАРТЕ
    // ============================================================

    loadReviews();
</script>

</body>
</html>
