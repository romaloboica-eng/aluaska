<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOT_MARKOT · Отель</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #1a0f0f, #0b0505);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Arial Black', system-ui, sans-serif;
            padding: 20px;
        }

        .card {
            max-width: 820px;
            width: 100%;
            background: rgba(20, 10, 10, 0.75);
            backdrop-filter: blur(4px);
            border: 2px solid #ffb347;
            border-radius: 60px 20px 60px 20px;
            box-shadow: 0 0 40px rgba(255, 180, 50, 0.3), inset 0 0 30px rgba(255, 140, 0, 0.2);
            padding: 2.8rem 2.2rem;
            transition: 0.3s;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: "🏨";
            position: absolute;
            font-size: 10rem;
            opacity: 0.04;
            right: -20px;
            bottom: -30px;
            transform: rotate(-8deg);
            pointer-events: none;
        }

        .card::after {
            content: "✦";
            position: absolute;
            font-size: 4rem;
            color: #ffb347;
            opacity: 0.15;
            top: 10px;
            left: 20px;
            transform: rotate(15deg);
        }

        .main-text {
            font-size: clamp(2.6rem, 15vw, 5.2rem);
            font-weight: 900;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: #ffe6b0;
            text-shadow: 
                0 0 10px #ff9f1c,
                0 0 30px #ff7b00,
                0 0 60px #ff4500,
                0 0 100px #cc3300;
            line-height: 1.15;
            word-break: break-word;
            position: relative;
            z-index: 2;
        }

        .main-text .highlight {
            display: inline-block;
            background: linear-gradient(135deg, #ffb347, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 40px #ff8800, 0 0 80px #ff5500;
            font-style: italic;
        }

        .sub-line {
            margin-top: 1.8rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 0.8rem 1.5rem;
            border-top: 1px dashed #ffb34760;
            padding-top: 1.8rem;
            position: relative;
            z-index: 2;
        }

        .hotel-name {
            font-size: clamp(2rem, 8vw, 3.2rem);
            font-weight: 800;
            color: #f7d9a0;
            text-shadow: 0 0 15px #ffaa33, 0 0 45px #ff7700;
            letter-spacing: 0.08em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .hotel-name span {
            background: #2d1a0a;
            padding: 0.1rem 0.9rem;
            border-radius: 60px;
            border: 1px solid #ffa54b;
            box-shadow: inset 0 0 12px #ff880055;
        }

        .stole-badge {
            background: #1f0f08;
            padding: 0.5rem 1.6rem;
            border-radius: 100px;
            border-left: 4px solid #ffb347;
            border-right: 4px solid #ffb347;
            font-size: clamp(1rem, 4vw, 1.5rem);
            font-weight: 700;
            color: #ffc489;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            box-shadow: 0 0 25px #ff880055;
            backdrop-filter: blur(2px);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .stole-badge::before {
            content: "⚡";
            font-size: 1.6rem;
            filter: drop-shadow(0 0 8px #ffaa00);
        }

        .stole-badge::after {
            content: "⚡";
            font-size: 1.6rem;
            filter: drop-shadow(0 0 8px #ffaa00);
        }

        .footer-note {
            margin-top: 2.2rem;
            font-size: 0.9rem;
            color: #b58a66;
            letter-spacing: 0.2em;
            opacity: 0.8;
            border-bottom: 1px dotted #ffb34740;
            padding-bottom: 0.8rem;
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            position: relative;
            z-index: 2;
        }

        .footer-note span {
            background: #1e110b;
            padding: 0.15rem 1rem;
            border-radius: 40px;
            border: 1px solid #ffb34730;
        }

        /* анимация мерцания */
        @keyframes flicker {
            0% { opacity: 0.9; text-shadow: 0 0 15px #ffb347, 0 0 40px #ff7700, 0 0 80px #ff4500; }
            50% { opacity: 1; text-shadow: 0 0 25px #ffcc66, 0 0 60px #ff9900, 0 0 120px #ff5500; }
            100% { opacity: 0.9; text-shadow: 0 0 15px #ffb347, 0 0 40px #ff7700, 0 0 80px #ff4500; }
        }

        .main-text {
            animation: flicker 2.8s infinite alternate ease-in-out;
        }

        .hotel-name span {
            animation: flicker 3.4s infinite alternate-reverse ease-in-out;
        }

        /* мобильная адаптация */
        @media (max-width: 500px) {
            .card {
                padding: 1.8rem 1.2rem;
                border-radius: 40px 10px 40px 10px;
            }
            .sub-line {
                flex-direction: column;
                gap: 0.5rem;
            }
            .stole-badge::before,
            .stole-badge::after {
                font-size: 1.2rem;
            }
            .footer-note {
                font-size: 0.7rem;
                gap: 0.4rem;
            }
        }

        /* дополнительный "грязный" эффект */
        .graffiti-tag {
            position: absolute;
            bottom: 8px;
            right: 18px;
            font-size: 0.85rem;
            color: #b57a4a60;
            letter-spacing: 0.3em;
            font-weight: 300;
            transform: rotate(-2deg);
            z-index: 1;
            background: #1a0d07;
            padding: 0 12px;
            border-radius: 30px;
            border: 1px dashed #ffb34720;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- главный удар -->
        <div class="main-text">
            <span class="highlight">KOT_MARKOT</span>
        </div>

        <!-- вторая линия: стыбзил + отель -->
        <div class="sub-line">
            <div class="stole-badge">
                СТЫБЗИЛ
            </div>
            <div class="hotel-name">
                <span>🏨 ЭТОТ ОТЕЛЬ</span>
            </div>
        </div>

        <!-- мелкая подпись для атмосферы -->
        <div class="footer-note">
            <span>✦ 2026 · КОТ-ВОРЮГА ✦</span>
            <span>#MARKOT_HOTEL</span>
        </div>

        <!-- метка-граффити (почти незаметно) -->
        <div class="graffiti-tag">⚡ K/M ⚡</div>
    </div>
</body>
</html>
